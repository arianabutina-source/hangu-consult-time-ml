services:
  - type: web
    name: hangu-consult-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/v1/health
    envVars:
      - key: LOG_LEVEL
        value: INFO
      - key: ALLOWED_ORIGINS
        # Deployed Vercel frontend (Milestone 18) -- both the stable project
        # alias and the deployment-specific alias -- plus localhost for
        # local frontend development against the live backend.
        value: https://frontend-ariana5.vercel.app,https://frontend-psi-seven-76.vercel.app,http://localhost:5173
